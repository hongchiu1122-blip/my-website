<!-- 轮播逻辑（单张全宽） -->
<script>
(function () {
  const track   = document.getElementById('stripTrack');
  const slides  = track.querySelectorAll('.strip-slide');
  const prevBtn = document.getElementById('stripPrev');
  const nextBtn = document.getElementById('stripNext');
  const total   = slides.length;
  let cur = 0, timer;

  function goTo(n) {
    cur = (n + total) % total;
    track.style.transform = 'translateX(-' + cur * 100 + '%)';
  }

  function startTimer() { timer = setInterval(() => goTo(cur + 1), 4500); }
  function resetTimer()  { clearInterval(timer); startTimer(); }

  nextBtn.addEventListener('click', () => { goTo(cur + 1); resetTimer(); });
  prevBtn.addEventListener('click', () => { goTo(cur - 1); resetTimer(); });

  startTimer();
})();
</script>

<!-- 导航栏滚动自适应 -->
<script>
(function () {
  const nav       = document.getElementById('mainNav');
  const logoBox   = nav.querySelector('.logo-box');
  const brandText = nav.querySelector('.brand-text');

  function updateNav() {
    if (window.scrollY > window.innerHeight * 0.8) {
      nav.style.background   = 'rgba(255,255,255,0.93)';
      nav.style.boxShadow    = '0 1px 0 rgba(0,0,0,0.06)';
      logoBox.style.cssText  = 'background:#000;border-color:#000;';
      brandText.style.backgroundImage = 'linear-gradient(135deg,#111 0%,#666 100%)';
    } else {
      nav.style.background   = 'rgba(0,0,0,0.15)';
      nav.style.boxShadow    = 'none';
      logoBox.style.cssText  = 'background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);';
      brandText.style.backgroundImage = 'linear-gradient(135deg,#fff 0%,#888 100%)';
    }
  }

  window.addEventListener('scroll', updateNav, { passive: true });
})();
</script>
